<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>太玄经模拟器</title>
  <link rel="stylesheet" href="styles.css">
  <style>
  #hudShortcut p {
    font-size: 1.25rem;
    font-weight: bold;
    line-height: 1.8;
  }
  /* 让标题和说明横向排列，标题自动居中 */
  .hud__title-row {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 64px;
    position: relative;
  }
  .hud__title-row h1 {
    flex: 1;
    text-align: center;
    margin: 0;
    font-size: 2rem;
  }
  #hudShortcut {
    min-width: 260px;
    margin-left: 16px;
    text-align: left;
    align-self: center;
  }
  /* 禁止双指缩放和滚动 */
  #gameCanvas {
  touch-action: none;
  } 
  </style>
</head>
<body>
  <div class="app">
    <header id="hud" class="hud">
      <div class="hud__brand">
        <p class="eyebrow">Canvas Framework</p>
        <div class="hud__title-row">
          <h1>太玄经模拟器</h1>
          <div id="hudShortcut" class="hud__shortcut" hidden>
            <p>奇门飞宫快捷键：鼠标左键</p>
            <p>纵横三才快捷键：1/2/3 </p>
            <p>用户移动：鼠标右键 </p>
          </div>
        </div>
      </div>
      <div class="hud__actions">
        <button id="startButton" class="button">开始游戏</button>
        <button id="resetButton" class="button button--ghost">重置</button>
      </div>
    </header>

    <main class="game-shell">
      <section class="game-panel">
        <canvas id="gameCanvas" class="game-canvas" aria-label="游戏画布"></canvas>
        <div id="skillHud" class="skill-hud" hidden>
          <div class="skill-icons-row">
            <div id="skillPanel" class="skill-panel skill-panel--canvas" hidden>
              <div
                id="skillIconWrap"
                class="skill-icon-wrap"
                style="--cooldown-progress: 0turn;"
                aria-label="奇门飞宫"
                title="奇门飞宫"
              >
                <img class="skill-panel__icon" src="./13871.png" alt="奇门飞宫">
                <div id="skillCooldownMask" class="skill-cooldown-mask" hidden></div>
                <span id="skillCount" class="skill-count">3</span>
              </div>
            </div>

            <div id="moveSkillPanel" class="move-skill-panel" hidden>
              <div class="move-skill" data-move-skill="1">
                <div class="move-skill__icon-wrap" style="--cooldown-progress: 0turn;">
                  <img class="move-skill__icon" src="./14051.png" alt="移1号灯">
                  <div class="move-skill__mask" hidden></div>
                  <span class="move-skill__key">1</span>
                </div>
                <span class="move-skill__label">移1号灯</span>
              </div>

              <div class="move-skill" data-move-skill="2">
                <div class="move-skill__icon-wrap" style="--cooldown-progress: 0turn;">
                  <img class="move-skill__icon" src="./14051.png" alt="移2号灯">
                  <div class="move-skill__mask" hidden></div>
                  <span class="move-skill__key">2</span>
                </div>
                <span class="move-skill__label">移2号灯</span>
              </div>

              <div class="move-skill" data-move-skill="3">
                <div class="move-skill__icon-wrap" style="--cooldown-progress: 0turn;">
                  <img class="move-skill__icon" src="./14051.png" alt="移3号灯">
                  <div class="move-skill__mask" hidden></div>
                  <span class="move-skill__key">3</span>
                </div>
                <span class="move-skill__label">移3号灯</span>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="lantern-agent.js"></script>
  <script src="script.js"></script>
</body>
</html>
